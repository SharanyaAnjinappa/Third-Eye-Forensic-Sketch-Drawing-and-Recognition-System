<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #001f3f, #000814);
    color: white;
}

/* Card */
.card {
    background: rgba(30, 41, 59, 0.9);
    padding: 40px;
    border-radius: 15px;
    width: 350px;
    text-align: center;

    box-shadow: 0 0 25px rgba(59,130,246,0.2);
}

/* Icon circle */
.icon-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(59,130,246,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px;

    box-shadow: 0 0 20px rgba(59,130,246,0.3);
}

/* Icon */
.icon {
    font-size: 30px;
    color: #4da3ff;
}

/* Title */
h2 {
    margin: 10px 0;
}

/* Subtitle */
.subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    color: #9bbcff;
    margin-bottom: 20px;
}

/* Label */
label {
    display: block;
    text-align: left;
    margin-bottom: 5px;
    font-size: 14px;
    color: #b0c4de;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #2d3b50;
    color: white;
    margin-bottom: 20px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover */
button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(59,130,246,0.5);
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 10px;
    color: #5c6b8a;
}
</style>
</head>
<body>
<div class="card">
    <div class="icon-circle">
        <div class="icon">🛡</div>
    </div>
    <h2>CriminalSketch Pro</h2>
    <div class="subtitle">LAW ENFORCEMENT FACE COMPOSITE SYSTEM</div>
    <form method="POST" action="/login">
        <label>Officer Email Address</label>
        <input type="email" name="email" placeholder="officer@precinct.gov" required>
        <button type="submit">Request Access Code</button>
    </form>
    <div class="footer">
        CLASSIFIED SYSTEM - UNAUTHORIZED ACCESS PROHIBITED
    </div>
</div>
</body>
</html>
