<!DOCTYPE html>
<html>
<head>
<title>Third Eye</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #001f3f, #000814);
    color: white;
    text-align: center;}
.icon-box {
    width: 70px;
    height: 70px;
    background: rgba(59, 130, 246, 0.1);
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(59,130,246,0.3);}
.icon {
    font-size: 30px;
    color: #4da3ff;}
h1 {
    font-size: 75px;
    margin: 10px 0;
    background: linear-gradient(90deg, #60a5fa, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;}
.tagline {
    letter-spacing: 5px;
    font-size: 18px;
    color: #9bbcff;
    margin-top: -5px;}
.line {
    width: 60px;
    height: 2px;
    background: #3b82f6;
    margin: 20px auto;}
.subtitle {
    color: #d6e5fa;
    font-size: 15px;
    margin-bottom: 30px;}
.btn {
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    padding: 15px 40px;
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;}
.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(59,130,246,0.5);}
.footer {
    position: absolute;
    bottom: 20px;
    font-size: 10px;
    color: #53607b;
    letter-spacing: 2px;}
</style>
</head>
<body>
<div class="icon-box">
    <div class="icon">👁</div>
</div>
<h1>Third Eye</h1>
<p class="tagline">FORENSIC SKETCH AND RECOGNITION</p>
<div class="line"></div>
<p class="subtitle">
    Advanced facial composite system for law enforcement agencies
</p>
<a href="/login" class="btn">Enter System →</a>
<div class="footer">
    CLASSIFIED SYSTEM • AUTHORIZED PERSONNEL ONLY
</div>
</body>
</html>
